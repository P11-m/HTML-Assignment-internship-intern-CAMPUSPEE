<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="author" content="Dennis">
<meta name="keywords" content="html,basics of webapp">
<meta name="description" content="my website for learning">

<title>learn FS JAVA | CAMPUS PEE</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
height:100vh;
margin:0;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;

background: linear-gradient(135deg,#ff9a9e,#fbc2eb,#a6c1ee);
}

.register-box{
width:320px;
padding:25px;
border-radius:15px;
background: linear-gradient(135deg,#ffffff,#e3f2fd);
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

h3{
color:#6a5acd;
font-weight:bold;
}

.btn-register{
background:#6a5acd;
color:white;
font-weight:bold;
border-radius:8px;
}

.btn-register:hover{
background:#5741c4;
}

a{
text-decoration:none;
color:#6a5acd;
font-weight:bold;
}

/* password strength text */
#strength{
font-size:13px;
font-weight:bold;
}

</style>

<script>

function checkStrength(){

var password=document.getElementById("password").value;
var strengthText=document.getElementById("strength");

if(password.length<6){
strengthText.innerHTML="Weak Password";
strengthText.style.color="red";
}
else if(password.match(/[A-Z]/) && password.match(/[0-9]/)){
strengthText.innerHTML="Strong Password";
strengthText.style.color="green";
}
else{
strengthText.innerHTML="Medium Password";
strengthText.style.color="orange";
}

}

function registerUser(){

var password=document.getElementById("password").value;
var confirmPassword=document.getElementById("confirmPassword").value;

if(password!==confirmPassword){
alert("Passwords do not match!");
return false;
}

alert("Registration Successful!");
window.location.href="login.html";
}

</script>

</head>

<body>

<div class="register-box">

<h3 class="text-center mb-3">Register</h3>

<input type="text" class="form-control mb-2" placeholder="Full Name">
<input type="email" class="form-control mb-2" placeholder="Email">
<input type="tel" class="form-control mb-2" placeholder="Phone Number">

<input type="password" id="password" class="form-control mb-1" placeholder="Password" onkeyup="checkStrength()">
<div id="strength" class="mb-2"></div>

<input type="password" id="confirmPassword" class="form-control mb-3" placeholder="Confirm Password">
<button class="btn btn-register w-100" onclick="registerUser()">Register</button>
<div class="text-center mt-3">
<a href="login.html">Already have an account? Login</a>
</div>

</div>

</body>
</html>
